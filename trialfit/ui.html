<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Clinical Trial Matching — Physician x Clinical Trial</title>
<style>
:root{--ink:#15151a;--mut:#63636f;--line:#e3e3e9;--bg:#f5f5f8;--pan:#fff;
 --accent:#2a4d8f;--ok:#0f7b3f;--warn:#8a6100;--bad:#a32020}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);
 font:14.5px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif}
.app{display:grid;grid-template-columns:294px 1fr;min-height:100vh}

/* ---- left rail ---- */
aside{background:var(--pan);border-right:1px solid var(--line);padding:20px 0;
 overflow-y:auto;max-height:100vh;position:sticky;top:0}
aside h1{font-size:15px;margin:0 20px 3px;letter-spacing:-.01em}
aside .tag{font-size:11.5px;color:var(--mut);margin:0 20px 18px}
.phys{padding:11px 20px;cursor:pointer;border-left:3px solid transparent}
.phys:hover{background:#fafafc}
.phys.on{background:#f0f4fb;border-left-color:var(--accent)}
.phys .n{font-weight:600;font-size:14px}
.phys .m{font-size:11.5px;color:var(--mut);margin-top:1px}
.trials{padding:2px 0 8px}
.tr{display:flex;justify-content:space-between;align-items:center;gap:8px;
 padding:6px 20px 6px 30px;cursor:pointer;font-size:12.5px}
.tr:hover{background:#fafafc}
.tr.on{background:#eef2fa;font-weight:600}
.tr .lbl{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tier{font-size:9.5px;text-transform:uppercase;letter-spacing:.05em;
 padding:1px 5px;border-radius:9px;font-weight:700;white-space:nowrap}
.t-known{background:#e8f5ee;color:var(--ok)}
.t-strong{background:#eef2fa;color:var(--accent)}
.t-moderate{background:#fdf3e0;color:var(--warn)}
.t-weak{background:#f0f0f3;color:var(--mut)}
.dot{width:5px;height:5px;border-radius:50%;background:#cfcfd8;flex:none}
.dot.rec{background:var(--ok)}

/* ---- main ---- */
main{padding:26px 34px 70px;max-width:1020px}
.head{display:flex;justify-content:space-between;align-items:flex-start;gap:20px;
 margin-bottom:20px}
.head h2{font-size:21px;margin:0 0 3px;letter-spacing:-.01em}
.head .s{color:var(--mut);font-size:13px}
.ctrl{display:flex;gap:8px;align-items:center}
button{border:1px solid var(--line);background:#fff;border-radius:7px;
 padding:8px 15px;font-size:13.5px;cursor:pointer;color:var(--ink)}
button:hover:not(:disabled){background:#f4f4f7}
button:disabled{opacity:.45;cursor:default}
button.pri{background:var(--accent);color:#fff;border-color:var(--accent)}
button.pri:hover:not(:disabled){background:#23407a}
select{border:1px solid var(--line);border-radius:7px;padding:8px 10px;font-size:13px}

.stage{background:var(--pan);border:1px solid var(--line);border-radius:9px;
 margin-bottom:11px;overflow:hidden;opacity:.42;transition:opacity .25s}
.stage.active,.stage.done{opacity:1}
.sh{display:flex;align-items:center;gap:11px;padding:13px 16px;cursor:pointer}
.sh:hover{background:#fafafc}
.ic{width:19px;height:19px;border-radius:50%;flex:none;display:grid;
 place-items:center;font-size:11px;font-weight:700;color:#fff;background:#c9c9d2}
.ic.running{background:var(--accent);animation:pulse 1s ease-in-out infinite}
.ic.done{background:var(--ok)}
.ic.skipped{background:#b6b6c0}
.ic.error{background:var(--bad)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.42}}
.st{flex:1;min-width:0}
.st .t{font-weight:600;font-size:14px}
.st .d{font-size:12.5px;color:var(--mut);margin-top:1px}
.chev{color:#b6b6c0;font-size:12px;flex:none}
.body{display:none;padding:0 16px 16px;border-top:1px solid #f0f0f4}
.stage.open .body{display:block}

h4{font-size:11.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--mut);
 margin:16px 0 7px}
table{width:100%;border-collapse:collapse;font-size:12.5px}
th{text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;
 color:var(--mut);padding:6px 8px;border-bottom:1px solid var(--line);font-weight:600}
td{padding:7px 8px;border-bottom:1px solid #f3f3f6;vertical-align:top}
code{background:#f3f3f7;padding:1px 4px;border-radius:3px;font-size:11.5px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(122px,1fr));
 gap:9px;margin:11px 0}
.kpi{border:1px solid var(--line);border-radius:7px;padding:10px 12px}
.kpi .v{font-size:18px;font-weight:650}
.kpi .k{font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;
 color:var(--mut);margin-top:1px}
.pill{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;
 font-weight:600}
.p-satisfied{background:#e8f5ee;color:var(--ok)}
.p-partial{background:#fdf3e0;color:var(--warn)}
.p-not_satisfied{background:#fdeaea;color:var(--bad)}
.p-unknown{background:#f0f0f3;color:var(--mut)}
.p-strong_fit{background:#e8f5ee;color:var(--ok)}
.p-possible_fit{background:#fdf3e0;color:var(--warn)}
.p-poor_fit{background:#fdeaea;color:var(--bad)}
.p-insufficient_evidence{background:#f0f0f3;color:var(--mut)}
.note{background:#f7f7fa;border-left:3px solid var(--line);padding:9px 12px;
 margin:10px 0;font-size:12.5px;color:var(--mut);border-radius:0 5px 5px 0}
.note.warn{background:#fdf3e0;border-left-color:#e0a83c;color:#6b4e00}
.attest{background:#fff4d6;border:1px solid #e8d08a;border-radius:3px;
 padding:0 4px;font-size:10px;color:#7a5c00;font-weight:700}
.delta{display:flex;gap:22px;align-items:center;flex-wrap:wrap;background:#f7f7fa;
 border-radius:7px;padding:12px 15px;margin:10px 0}
.delta .a{font-size:12px;color:var(--mut)}
.delta .a b{display:block;font-size:15px;color:var(--ink);margin-top:2px}
.qa{border:1px solid var(--line);border-radius:7px;padding:10px 13px;margin:7px 0}
.qa .q{font-weight:600;font-size:13px}
.qa .ans{margin-top:5px;padding-left:11px;border-left:2px solid #e8d08a;font-size:13px}
.qa textarea{width:100%;margin-top:7px;border:1px solid var(--line);border-radius:6px;
 padding:8px 10px;font:inherit;font-size:13px;resize:vertical;min-height:52px}
.qa textarea:focus{outline:none;border-color:var(--accent)}
.askbar{display:flex;gap:10px;align-items:center;margin-top:12px;flex-wrap:wrap}
.askbar .hint{font-size:12px;color:var(--mut)}
.empty{text-align:center;color:var(--mut);padding:90px 20px;font-size:14px}
.bar{height:6px;background:#eee;border-radius:3px;overflow:hidden;margin-top:5px}
.bar>i{display:block;height:100%;background:var(--accent)}
.final{background:var(--pan);border:2px solid var(--accent);border-radius:9px;
 padding:18px 20px;margin-top:16px;display:flex;justify-content:space-between;
 align-items:center;gap:20px;flex-wrap:wrap}
.final .n{font-size:27px;font-weight:650;letter-spacing:-.02em}
.legend{margin-top:14px;padding-top:13px;border-top:1px solid var(--line)}
.legend h5{font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;
 color:var(--mut);margin:0 0 8px;font-weight:600}
.legend .row{display:flex;align-items:baseline;gap:9px;margin:5px 0;font-size:12px}
.legend .row .lab{min-width:132px}
.legend .row .def{color:var(--mut)}
.legend .row.on{background:#f7f7fa;border-radius:5px;padding:4px 7px;margin:3px -7px}
.legend .rule{font-size:11.5px;color:var(--mut);margin-top:9px;padding-top:8px;
 border-top:1px dashed var(--line)}
.auc{background:var(--pan);border:1px solid var(--line);border-radius:9px;
 padding:16px 20px;margin-top:12px}
.auc .top{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap}
.auc .num{font-size:26px;font-weight:650;letter-spacing:-.02em}
.auc .cap{font-size:12px;color:var(--mut)}
.auc details{margin-top:10px}
.auc summary{cursor:pointer;font-size:12px;color:var(--accent)}
.auc .work{font-size:12px;color:var(--mut);margin-top:8px;line-height:1.6}
.auc code{font-size:11px}
</style></head><body>
<div class="app">
<aside>
  <h1>Clinical Trial Matching</h1>
  <div class="tag">Physician x Clinical Trial · public data only</div>
  <div id="rail"></div>
</aside>
<main>
  <div class="head">
    <div>
      <h2 id="title">Select a physician</h2>
      <div class="s" id="sub">Their trials appear below the name. Pick one to score it.</div>
    </div>
    <div class="ctrl">
      <select id="mode">
        <option value="replay">Replay (recorded)</option>
        <option value="live">Live (uses API)</option>
      </select>
      <button class="pri" id="go" disabled>Run</button>
    </div>
  </div>
  <div id="stages"></div>
  <div id="final"></div>
</main>
</div>
<script>
const $ = s => document.querySelector(s);
const esc = s => String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const pct = v => v == null ? '—' : Math.round(v * 100) + '%';
let physicians = [], sel = {npi:null, nct:null}, es = null;

function kpi(v, k){ return `<div class="kpi"><div class="v">${esc(v)}</div><div class="k">${esc(k)}</div></div>`; }
function pill(v){ return `<span class="pill p-${esc(v)}">${esc(String(v).replace(/_/g,' '))}</span>`; }

// System-level, not pair-level: how well the scorer separates pairs we EXPECTED
// to score well from ones we didn't. Shown once, below the per-pair result, so
// nobody mistakes it for this physician's score.
async function renderAUC(){
  let e;
  try { e = await (await fetch('/api/evaluation')).json() } catch(_) { return '' }
  if(!e.available) return `<div class="auc"><div class="cap">Evaluation harness: ${esc(e.reason||'no data yet')}</div></div>`;
  return `<div class="auc">
    <div class="top">
      <div>
        <div style="font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--mut)">Does the scorer discriminate?</div>
        <div class="num">AUC ${e.auc_strong_vs_weak ?? '\u2014'}</div>
      </div>
      <div class="cap" style="flex:1;min-width:220px">${esc(e.verdict)}</div>
    </div>
    <details>
      <summary>how this number is generated</summary>
      <div class="work">
        Pairwise <b>Mann-Whitney AUC</b> — identical to the area under the ROC
        curve, computed without building one.
        <br><br>
        Each pair carries an expected-fit tier assigned <b>before any scoring</b>.
        <code>known</code>+<code>strong</code> are positives,
        <code>moderate</code>+<code>weak</code> are negatives. Compare every
        positive <code>p</code> against every negative <code>n</code>:
        <br><br>
        <code>wins = \u03a3 (p &gt; n) + 0.5 \u00d7 (p == n)</code><br>
        <code>AUC&nbsp; = wins / (len(pos) \u00d7 len(neg))</code>
        <br><br>
        <b>0.5 is a coin flip</b> — the score carries no information.
        1.0 is perfect separation. Based on ${e.n_pairs} scored pairs;
        small n, treat as directional.
      </div>
    </details>
  </div>`;
}

async function boot(){
  physicians = await (await fetch('/api/physicians')).json();
  $('#rail').innerHTML = physicians.map(p => `
    <div class="phys" data-npi="${p.npi}">
      <div class="n">${esc(p.name)}</div>
      <div class="m">${esc(p.specialty)} · ${esc(p.city)}, ${esc(p.state)} · ${p.n_trials} trials</div>
    </div>
    <div class="trials" id="tr-${p.npi}" style="display:none">
      ${p.trials.map(t => `<div class="tr" data-npi="${p.npi}" data-nct="${t.nct_id}">
        <span class="dot ${t.recorded?'rec':''}"></span>
        <span class="lbl">${esc(t.label || t.nct_id)}</span></div>`).join('')}
    </div>`).join('');

  document.querySelectorAll('.phys').forEach(el => el.onclick = () => {
    const npi = el.dataset.npi, open = $('#tr-'+npi).style.display !== 'none';
    document.querySelectorAll('.trials').forEach(t => t.style.display='none');
    document.querySelectorAll('.phys').forEach(p => p.classList.remove('on'));
    if(!open){ $('#tr-'+npi).style.display='block'; el.classList.add('on'); }
    const p = physicians.find(x => x.npi === npi);
    $('#title').textContent = p.name;
    $('#sub').textContent = `${p.taxonomy} · ${p.city}, ${p.state}`;
  });

  document.querySelectorAll('.tr').forEach(el => el.onclick = e => {
    e.stopPropagation();
    document.querySelectorAll('.tr').forEach(t => t.classList.remove('on'));
    el.classList.add('on');
    sel = {npi: el.dataset.npi, nct: el.dataset.nct};
    const p = physicians.find(x => x.npi === sel.npi);
    const t = p.trials.find(x => x.nct_id === sel.nct);
    $('#title').textContent = `${p.name} × ${t.label || t.nct_id}`;
    $('#sub').innerHTML = `${esc(sel.nct)}${t.recorded?' · recorded':' · not recorded — needs a live run'}`;
    $('#go').disabled = false;
    $('#stages').innerHTML = ''; $('#final').innerHTML = '';
  });
}

$('#go').onclick = () => {
  if(!sel.nct) return;
  $('#go').disabled = true; $('#stages').innerHTML = ''; $('#final').innerHTML = '';
  if(es) es.close();
  es = new EventSource(`/api/run?nct=${sel.nct}&npi=${sel.npi}&mode=${$('#mode').value}`);
  es.addEventListener('stage', e => renderStage(JSON.parse(e.data)));
  es.addEventListener('final', e => { renderFinal(JSON.parse(e.data)); es.close(); $('#go').disabled=false; });
  es.addEventListener('await', e => { renderAsk(JSON.parse(e.data)); es.close(); $('#go').disabled=false; });
  es.addEventListener('error', e => {
    let m = 'stream error';
    try { m = JSON.parse(e.data).error } catch(_){}
    $('#final').innerHTML = `<div class="note warn"><b>Error.</b> <code>${esc(m)}</code></div>`;
    es.close(); $('#go').disabled = false;
  });
};

function renderStage(s){
  let el = document.getElementById('s-'+s.key);
  if(!el){
    el = document.createElement('div');
    el.className = 'stage'; el.id = 's-'+s.key;
    el.innerHTML = `<div class="sh"><div class="ic"></div><div class="st">
      <div class="t"></div><div class="d"></div></div><div class="chev">▾</div></div>
      <div class="body"></div>`;
    el.querySelector('.sh').onclick = () => el.classList.toggle('open');
    $('#stages').appendChild(el);
  }
  el.classList.add(s.status === 'running' ? 'active' : 'done');
  el.querySelector('.ic').className = 'ic ' + s.status;
  el.querySelector('.ic').textContent = s.status === 'done' ? '✓' : s.status === 'error' ? '!' : '';
  el.querySelector('.t').textContent = s.label;
  el.querySelector('.d').textContent = s.detail || (s.status === 'running' ? 'working…' : '');
  if(s.data) el.querySelector('.body').innerHTML = BODY[s.key] ? BODY[s.key](s.data) : '';
}

const BODY = {
  trial: d => `
    <h4>Record</h4>
    <div class="grid">${kpi(d.phase||'—','phase')}${kpi(d.enrollment??'—','enrollment')}
      ${kpi(d.n_sites??'—','sites')}${kpi(d.n_us_sites??'—','US sites')}</div>
    <p style="font-size:13px">${esc(d.title)}</p>
    <p style="font-size:12.5px;color:var(--mut)">${esc(d.sponsor)} · ${esc((d.conditions||[]).join(', '))}</p>
    <h4>Interventions</h4>
    <div style="font-size:12.5px">${(d.interventions||[]).map(i=>`<div>${esc(i)}</div>`).join('') || '—'}</div>
    <h4>The eligibility split</h4>
    <div class="note">Only <b>population-defining</b> criteria describe patients a practice must already treat, so only those become requirements. <b>Screening</b> criteria are checked per enrolled patient and say nothing about physician fit.</div>
    <div class="grid">${kpi(d.n_population_defining,'population-defining → requirements')}${kpi(d.n_screening,'screening → excluded')}</div>
    <table><thead><tr><th>Population-defining (used)</th></tr></thead><tbody>
      ${(d.population_sample||[]).map(c=>`<tr><td>${esc(c)}</td></tr>`).join('')}</tbody></table>
    <table style="margin-top:9px"><thead><tr><th>Screening (excluded)</th></tr></thead><tbody>
      ${(d.screening_sample||[]).map(c=>`<tr><td style="color:var(--mut)">${esc(c)}</td></tr>`).join('')}</tbody></table>
    <h4>Operational burden</h4>
    <div class="note ${d.burden_source==='inferred'?'warn':''}">
      ${d.soa_found ? `Read from the posted protocol's Schedule of Assessments, page ${d.soa_page} (confidence: <code>${esc(d.soa_confidence)}</code>).`
        : 'No protocol posted — burden is <b>inferred</b> from phase and design, not read from a visit schedule.'}</div>`,

  rubric: d => !d.available ? `<div class="note warn">${esc(d.reason)}</div>` : `
    <div class="grid">${kpi(d.scoring.n_criteria,'criteria')}${kpi(d.scoring.max_score,'max points')}
      ${kpi(pct(d.scoring.public_coverage),'publicly verifiable')}${kpi(d.scoring.n_self_report_only,'self-report only')}</div>
    <p><b>Target patient.</b> ${esc(d.target_patient)}</p>
    <p><b>Site burden.</b> ${esc(d.site_burden)}</p>
    <h4>Criteria — generated for this trial</h4>
    <table><thead><tr><th>Requirement</th><th>Satisfies if</th><th>Weight</th><th>Sources</th></tr></thead><tbody>
      ${d.criteria.map(c=>`<tr>
        <td><b>${esc(c.requirement)}</b><div style="color:var(--mut);font-size:11.5px">${esc(c.dimension)} · <code>${esc(c.id)}</code></div>
          <div style="color:var(--mut);font-size:11px;margin-top:2px">from: ${esc(c.derived_from)}</div></td>
        <td style="font-style:italic;color:var(--mut)">${esc(c.satisfies_if)}</td>
        <td>${c.criticality==='hard_gate'?'<span class="attest">GATE</span>':c.criticality==='primary'?'3':'1'}</td>
        <td style="font-size:11.5px">${(c.data_sources||[]).map(s=>`<code>${esc(s)}</code>`).join(' ')}</td></tr>`).join('')}
    </tbody></table>
    <h4>Screening deliberately excluded</h4>
    <div style="font-size:12.5px;color:var(--mut)">${(d.excluded_screening||[]).map(x=>`<div>· ${esc(x)}</div>`).join('')||'—'}</div>
    <div class="note">Generated by <code>${esc(d.model)}</code> at effort <code>${esc(d.effort)}</code>. The model labels each criterion's criticality; the weights and totals are computed in code, so the model cannot tune the arithmetic.</div>`,

  evidence: d => `
    <div class="note"><b>Excluded before scoring:</b> ${d.excluded.roles} investigator role(s) and ${d.excluded.publications} publication(s) about <code>${esc(d.excluded.target_trial)}</code>. ${esc(d.excluded.why)}</div>
    <h4>${d.n_refs_available} citable records the matcher may use</h4>
    ${d.sources.map(s=>`
      <h4 style="margin-top:13px">${esc(s.source)} — <span style="text-transform:none;letter-spacing:0">${esc(s.summary)}</span></h4>
      ${s.caveat?`<div class="note warn" style="margin:4px 0">${esc(s.caveat)}</div>`:''}
      ${s.records.length?`<table><tbody>${s.records.map(r=>`<tr>
        <td style="width:150px"><code>${esc(r.ref)}</code></td>
        <td>${esc(r.title||r.taxonomy||r.study||r.description||'')}
          ${r.amount_usd?` · $${esc(r.amount_usd)}`:''}${r.n_services?` · ${esc(r.n_services)} services`:''}
          ${r.payer?` · ${esc(r.payer)}`:''}${r.year?` · ${esc(r.year)}`:''}
          ${r.abstract?`<details style="margin-top:5px"><summary style="cursor:pointer;font-size:11.5px;color:var(--accent)">abstract</summary><div style="font-size:12px;color:var(--mut);margin-top:4px;line-height:1.5">${esc(r.abstract)}</div></details>`:''}</td></tr>`).join('')}</tbody></table>`:''}
    `).join('')}
    ${d.gaps.length?`<h4>Known gaps in public data</h4><div class="note warn">${d.gaps.map(g=>`<div>· ${esc(g)}</div>`).join('')}</div>`:''}`,

  match: d => !d.available ? `<div class="note warn">${esc(d.reason)}</div>` : `
    <div class="grid">${kpi(d.scoring.score+'/'+d.scoring.max_score,'score')}
      ${kpi(pct(d.scoring.score_pct),'of available')}${kpi(pct(d.scoring.coverage),'coverage')}
      ${kpi(d.scoring.verdict_counts.unknown||0,'unknown')}</div>
    <p>${esc(d.narrative)}</p>
    <h4>Verdict per criterion — with the evidence cited</h4>
    <table><thead><tr><th>Criterion</th><th>Verdict</th><th>Rationale &amp; evidence</th></tr></thead><tbody>
      ${d.verdicts.map(v=>`<tr>
        <td><b>${esc(v.requirement||v.criterion_id)}</b>
          <div style="color:var(--mut);font-size:11px">${esc(v.dimension)} · ${esc(v.criticality)}</div></td>
        <td>${pill(v.verdict)}</td>
        <td>${esc(v.rationale)}
          ${(v.evidence_refs||[]).length?`<div style="margin-top:4px">${v.evidence_refs.map(r=>`<code>${esc(r)}</code>`).join(' ')}</div>`:''}</td>
      </tr>`).join('')}</tbody></table>
    <div class="note">Verdicts are the model's judgment. Score, gate logic, coverage and the recommendation are computed in code from those verdicts — the model is schema-forbidden from emitting a score. Cited refs are validated against the dossier, so a phantom citation fails rather than ships.</div>`,

  precedent: d => !d.available ? `<div class="note">${esc(d.reason)}</div>` : `
    <div class="grid">${kpi(pct(d.completion_rate),'completed')}${kpi(pct(d.stopped_early_rate),'stopped early')}
      ${kpi(pct(d.accrual_failure_rate),'stopped: could not enrol')}${kpi(d.n_similar,'comparable trials')}</div>
    ${d.sample_note?`<div class="note warn">${esc(d.sample_note)}</div>`:''}
    <p style="font-size:12.5px">Matched on condition <b>${esc(d.query.condition)}</b>, phase ${esc((d.query.phases||[]).join('/')||'any')}, intervention ${esc((d.query.intervention_types||[]).join('/')||'any')}.</p>
    <h4>Why comparable trials stopped</h4>
    <table><tbody>${Object.entries(d.stop_reasons||{}).map(([k,v])=>`<tr><td>${esc(k.replace(/_/g,' '))}</td><td>${v}</td></tr>`).join('')}</tbody></table>
    <div class="note warn"><b>Operational outcome only.</b> ${esc(d.caveat)}</div>`,

  patient: d => !d.available ? `<div class="note">${esc(d.reason)}</div>` : `
    <div class="grid">${kpi(d.median_proxy,'median proxy /100')}${kpi(d.n_scored,'trials scored')}
      ${kpi(d.min_proxy+'–'+d.max_proxy,'range')}${kpi(d.n_skipped_no_results,'skipped: no results')}</div>
    <h4>Comparable trials, by participant experience</h4>
    <table><thead><tr><th>Trial</th><th>Proxy</th><th>Retention</th><th>Voluntary withdrawal</th></tr></thead><tbody>
      ${d.trials.map(t=>{const f=t.participant_flow||{};return `<tr>
        <td><code>${esc(t.nct_id)}</code> ${esc(t.label)}<div style="color:var(--mut);font-size:11px">${esc(t.status)}</div></td>
        <td><b>${t.experience_proxy}</b><div class="bar"><i style="width:${t.experience_proxy}%"></i></div></td>
        <td>${f.retention_interpretable===false?'<span style="color:var(--mut)">n/a — treat-until-progression</span>':pct(f.retention_rate)}</td>
        <td>${pct(f.voluntary_withdrawal_rate)}</td></tr>`}).join('')}</tbody></table>
    <div class="note warn"><b>A proxy, not satisfaction.</b> ${esc(d.caveat)} Weights: ${Object.entries(d.weights||{}).map(([k,v])=>`${k.replace(/_/g,' ')} ${Math.round(v*100)}%`).join(', ')}.</div>`,

  interview: d => !d.available ? `<div class="note">${esc(d.reason)}</div>` : `
    <p style="font-size:13px">Public records could not settle ${d.gaps.length} criteria. These went to the physician directly; answers are recorded as <span class="attest">SELF-REPORTED</span> and weighed as testimony, not public evidence.</p>
    ${d.questions.map(q=>{const a=(d.answers||{})[q.criterion_id]; const skip=!a||String(a).toLowerCase()==='skip';
      return `<div class="qa"><div class="q">${esc(q.question)}</div>
        <div style="color:var(--mut);font-size:11.5px">${esc(q.why||'')} · <code>${esc(q.criterion_id)}</code></div>
        <div class="ans">${skip?'<i style="color:var(--mut)">Not answered — criterion left unresolved.</i>':esc(a)}</div></div>`}).join('')}`,

  rescore: d => !d.available ? `<div class="note">${esc(d.reason)}</div>` : BODY.match(d),
};

// Live mode pauses here: the answers have to come from a person, so the run
// waits rather than inventing them.
function renderAsk(d){
  if(!d.questions.length){ renderFinal({scoring:d.scoring, report_url:d.report_url}); return; }
  const box = document.createElement('div');
  box.className = 'stage done open'; box.id = 's-ask';
  box.innerHTML = `<div class="sh"><div class="ic done">?</div><div class="st">
      <div class="t">Answer the gaps, then re-score</div>
      <div class="d">${d.questions.length} question(s) public data could not settle</div>
    </div></div>
    <div class="body">
      <div class="note">These answers are recorded as <span class="attest">SELF-REPORTED</span> and weighed as testimony, not public evidence. Leave one blank to keep that gap open — an honest report usually has one.</div>
      ${d.questions.map(q=>`<div class="qa">
        <div class="q">${esc(q.question)}</div>
        <div style="color:var(--mut);font-size:11.5px">${esc(q.why||'')} · <code>${esc(q.criterion_id)}</code></div>
        <textarea data-cid="${esc(q.criterion_id)}" placeholder="Physician's answer — or leave blank to skip"></textarea>
      </div>`).join('')}
      <div class="askbar">
        <button class="pri" id="submitAns">Submit &amp; re-score</button>
        <span class="hint" id="ansHint">runs the matcher again on the augmented evidence</span>
      </div>
    </div>`;
  $('#stages').appendChild(box);
  box.scrollIntoView({behavior:'smooth', block:'nearest'});
  $('#submitAns').onclick = async () => {
    const answers = {};
    box.querySelectorAll('textarea').forEach(t => { if(t.value.trim()) answers[t.dataset.cid] = t.value.trim(); });
    if(!Object.keys(answers).length){ $('#ansHint').textContent = 'answer at least one to re-score'; return; }
    $('#submitAns').disabled = true; $('#ansHint').textContent = 're-scoring…';
    const r = await (await fetch('/api/interview', {method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({nct: d.nct_id, npi: d.npi, answers})})).json();
    if(r.error){ $('#ansHint').textContent = 'error: ' + r.error.slice(0,120); $('#submitAns').disabled=false; return; }
    $('#ansHint').textContent = `re-scored · $${(r.cost_usd||0).toFixed(3)}`;
    box.querySelectorAll('textarea').forEach(t=>t.disabled=true);
    renderStage({key:'rescore', label:'Re-scored with attestations', status:'done',
      detail:`${r.after.recommendation} — ${r.after.score}/${r.after.max_score}, ${Math.round(r.after.coverage*100)}% coverage`,
      data:r.rescore});
    const dl = document.createElement('div');
    dl.className = 'delta';
    dl.innerHTML = `<div class="a">Before (public only)<b>${esc(r.before.recommendation.replace(/_/g,' '))}</b></div>
      <div style="font-size:19px;color:var(--mut)">→</div>
      <div class="a">After interview<b>${esc(r.after.recommendation.replace(/_/g,' '))}</b></div>
      <div class="a">Score<b>${r.before.score} → ${r.after.score}</b></div>
      <div class="a">Coverage<b>${Math.round(r.before.coverage*100)}% → ${Math.round(r.after.coverage*100)}%</b></div>`;
    document.getElementById('s-rescore').querySelector('.body').prepend(dl);
    renderFinal({scoring:r.after, before:r.before, report_url:r.report_url});
  };
}

const FIT_DEFS = [
  ['strong_fit',            'score \u2265 70% of available points, gate passed'],
  ['possible_fit',          'score 40\u201369%'],
  ['poor_fit',              'score < 40%, OR a hard gate failed'],
  ['insufficient_evidence', 'fewer than 50% of criteria could be adjudicated'],
];

function legend(current){
  return `<div class="legend">
    <h5>How these are decided</h5>
    ${FIT_DEFS.map(([k,d]) => `<div class="row${k===current?' on':''}">
      <span class="lab">${pill(k)}</span><span class="def">${esc(d)}</span></div>`).join('')}
    <div class="rule"><b>Order matters.</b> A failed gate outranks a good score,
      and thin coverage outranks a confident-looking one. <b>poor fit</b> means
      no; <b>insufficient evidence</b> means we don't know.</div>
  </div>`;
}

function renderFinal(f){
  const s = f.scoring || {};
  const b = f.before;   // set only when an interview actually re-scored
  const twoScores = b ? `
    <div style="display:flex;gap:26px;align-items:flex-start;flex-wrap:wrap">
      <div>
        <div style="font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--mut)">Before interview</div>
        <div class="n" style="color:var(--mut)">${esc(b.score)}<span style="font-size:15px">/${esc(b.max_score)}</span></div>
        <div style="margin-top:4px">${pill(b.recommendation)}</div>
        <div style="font-size:11.5px;color:var(--mut);margin-top:3px">${pct(b.coverage)} coverage · public data only</div>
      </div>
      <div style="font-size:22px;color:var(--mut);align-self:center">→</div>
      <div>
        <div style="font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--mut)">After interview</div>
        <div class="n">${esc(s.score)}<span style="font-size:15px;color:var(--mut)">/${esc(s.max_score)}</span></div>
        <div style="margin-top:4px">${pill(s.recommendation)}</div>
        <div style="font-size:11.5px;color:var(--mut);margin-top:3px">${pct(s.coverage)} coverage · incl. self-report</div>
      </div>
    </div>` : `
    <div><div style="font-size:11.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--mut)">Final assessment</div>
      <div class="n">${esc(s.score)}<span style="font-size:17px;color:var(--mut)">/${esc(s.max_score)}</span></div>
      <div style="margin-top:5px">${pill(s.recommendation)}</div>
      <div style="font-size:12px;color:var(--mut);margin-top:4px">${esc(s.reason||'')}</div></div>`;
  $('#final').innerHTML = `<div class="final">
    ${twoScores}
    <div style="text-align:right">
      ${f.live_seconds?`<div style="font-size:11.5px;color:var(--mut);margin-bottom:7px">live run took ${f.live_seconds}s and cost $${(f.live_cost_usd||0).toFixed(3)} · this replay cost nothing</div>`:''}
      <a href="${f.report_url}" target="_blank"><button class="pri">Open full report ↗</button></a>
      <div style="font-size:11.5px;color:var(--mut);margin-top:6px">rubric · every verdict · evidence links · print to PDF</div>
      <div style="margin-top:10px"><button id="act">Take action</button></div>
      <div id="actHint" style="font-size:11.5px;color:var(--mut);margin-top:5px"></div>
    </div></div>
    ${legend(s.recommendation)}
    <div id="aucSlot"></div>`;
  renderAUC().then(html => { const el = document.getElementById('aucSlot'); if(el) el.innerHTML = html; });
  // Placeholder — this is where a real deployment would open a site-qualification
  // packet or a CTMS record. It intentionally does nothing yet, and says so
  // rather than pretending to have worked.
  const act = document.getElementById('act');
  if(act) act.onclick = () => {
    document.getElementById('actHint').textContent =
      'Not wired up — a real deployment would start site qualification here.';
  };
}
boot();
</script></body></html>
